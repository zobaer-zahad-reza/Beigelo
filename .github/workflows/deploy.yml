name: Deploy Website to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Execute deployment script on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Step 1: Go to the project root and pull the latest code
            echo "==== Pulling latest code from GitHub... ===="
            cd /var/www/Beigelo
            git pull origin main

            # Step 2: Deploy Frontend
            echo "==== Starting Frontend Deployment... ===="
            cd frontend
            echo "Removing old build folder..."
            rm -rf dist  # <-- পুরোনো dist ফোল্ডার মুছে ফেলা হচ্ছে
            echo "Installing dependencies for Frontend..."
            npm install
            echo "Building Frontend..."
            npm run build
            echo "✅ Frontend Deployment Complete!"

            # Step 3: Deploy Admin Panel
            echo "==== Starting Admin Deployment... ===="
            cd ../admin
            echo "Removing old build folder..."
            rm -rf dist  # <-- পুরোনো dist ফোল্ডার মুছে ফেলা হচ্ছে
            echo "Installing dependencies for Admin..."
            npm install
            echo "Building Admin..."
            npm run build
            echo "✅ Admin Deployment Complete!"

            # Step 4: Deploy Backend
            echo "==== Starting Backend Deployment... ===="
            cd ../backend
            echo "Installing dependencies for Backend..."
            npm install
            echo "Restarting server with PM2..."
            pm2 restart beigelo_server
            echo "✅ Backend Deployment Complete!"
            echo "🚀 Deployment Successful!"
